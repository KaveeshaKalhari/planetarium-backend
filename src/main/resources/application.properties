# =============================================
# Database
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/planetariumdb
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Tells Hibernate to use PostgreSQL dialect explicitly (avoids auto-detection warnings)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# JWT
# =============================================
jwt.secret=your-secure-256-bit-secret-key-change-this-in-production-minimum-32-characters
jwt.expiration=86400000

# =============================================
# Google OAuth2
# =============================================
spring.security.oauth2.client.registration.google.client-id=733025342543-29ap7hn1ma9houlm1lpm2uj23udche0e.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/v1/auth/google/callback

# =============================================
# CORS / Frontend
# =============================================
frontend.url=http://localhost:5173

# =============================================
# Booking Pricing
# Used by BookingService via @Value — change here, takes effect everywhere
# =============================================
booking.tax.rate=0.07
booking.service.fee=2.50
booking.price.weekday=150.00
booking.price.weekend=150.00

# =============================================
# Email (Gmail SMTP)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=srilanka.smartplanetarium@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

planetarium.email=srilanka.smartplanetarium@gmail.com

# =============================================
# Scheduling (needed by SeatService.releaseExpiredHolds)
# =============================================
spring.task.scheduling.pool.size=2

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
server.tomcat.max-http-form-post-size=15MB
server.tomcat.max-swallow-size=15MB